<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Tables</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>1</th>
            <th>2</th>
            <th>3</th>
        </tr>
        <tr>
            <td colspan = "2">4</td>
            
            <td>5</td>
        </tr>
        <tr>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
    </table>



  

    <table border ="1">
        <caption>Time Table</caption>
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
        </tr>
        <tr>
            <td>9:00-10:00</td>
            <td>Math</td>
            <td>English</td>
            <td>Science</td>
        </tr>
        <tr>
            <td>10:00-12:00</td>
            <td>Computer lab</td>
            <td>Physics</td>
            <td>Chemistry</td>
        </tr>
        <tr>
            <td>11:00-12:00</td>
            <td>Mathematics</td>
            <td colspan="2">Biology</td>
            
        </tr>
        <tr>
            <td colspan="3">12:00-13:00</td>
            
        </tr>
        <tr>
            <td>13:00-14:00</td>
            <td>Sports</td>
            <td>Arts</td>
            <td>Music</td>
        </tr>
    </table>


</body>
</html>
