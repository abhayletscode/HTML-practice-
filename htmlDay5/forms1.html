<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>

<form>

   


<fieldset>

    <legend>Personal Details</legend>
        <label for="username">Enter your full name</label>
    <br>
    <input type="text" id = "username" name="username" required>
    <br>
    <label for="email">Enter your gmail</label>
    <br>
    <input  id="email" type="email" name="email" required>
    <br>
    <label for="password" > Enter your password</label>
    <br>
    <input id="password" type="password" name="password" required>
</fieldset>

<br>



<fieldset>
    
    <label for="gender">Gender</label>
    <br>
    <input id="male" type="radio" value="Male" name="gender" required>
    <label for="male">Male</label>
    <input id="female" type="radio" value="female" name="gender" required>
    <label for="female">female</label>
    <input id="Others" type="radio" value="Others" name="gender" required>
    <label for="Others">Others</label>
    <br>
    <label for="dob">Date of birth</label>
    <br>
    <input id="dob" type="date" name="dob" required>
    <br>
    <label for="address">Address</label>
    <br>
    <textarea id="address" name="address" required></textarea>
</fieldset>
<br>
    <input type="submit" value="submit">






</form>



  


</body>
</html>
